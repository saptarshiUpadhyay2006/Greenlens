<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100" height="100">
  <defs>
    <!-- Leaf gradient: lime-green → deep emerald -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>

    <!-- Lens ring gradient: teal → deep teal -->
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="60%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>

    <!-- Glass highlight gradient -->
    <radialGradient id="glassGrad" cx="38%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#d1fae5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#065f46" stop-opacity="0.1"/>
    </radialGradient>

    <!-- Lens outer glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- LEAF — organic curved shape upper-left -->
  <path
    d="M 18 14
       C 10 28, 8 50, 22 60
       C 28 64, 36 62, 42 56
       C 52 44, 52 26, 40 18
       C 34 14, 24 10, 18 14 Z"
    fill="url(#leafGrad)"
    opacity="0.97"
  />
  <!-- Leaf mid-vein -->
  <path
    d="M 20 16 Q 38 36 40 58"
    stroke="#dcfce7"
    stroke-width="1.2"
    stroke-linecap="round"
    opacity="0.55"
    fill="none"
  />
  <!-- Leaf secondary veins -->
  <path
    d="M 26 24 Q 36 26 40 36 M 22 36 Q 32 38 38 48"
    stroke="#dcfce7"
    stroke-width="0.7"
    stroke-linecap="round"
    opacity="0.35"
    fill="none"
  />

  <!-- LENS RING — lower right, overlapping leaf -->
  <circle cx="62" cy="62" r="26" fill="url(#lensGrad)" filter="url(#glow)"/>
  <!-- Lens inner track -->
  <circle cx="62" cy="62" r="19" fill="none" stroke="#99f6e4" stroke-width="1.2" opacity="0.5"/>
  <!-- Lens glass face -->
  <circle cx="62" cy="62" r="15" fill="url(#glassGrad)"/>
  <!-- Glass specular highlight -->
  <ellipse cx="56" cy="56" rx="5" ry="3.5" fill="white" opacity="0.45" transform="rotate(-30 56 56)"/>

  <!-- Connector curl: leaf stem wraps around lens ring -->
  <path
    d="M 40 58 C 46 66, 54 70, 62 62"
    stroke="url(#leafGrad)"
    stroke-width="3.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.8"
  />
</svg>
